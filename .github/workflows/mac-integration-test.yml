name: Mac Integration Test

on:
  workflow_dispatch:
    inputs:
      java_version:
        description: 'JDK version'
        required: false
        default: '21'
        type: choice
        options:
          - '11'
          - '17'
          - '21'
  push:
    branches: [ main, master ]
    paths:
      - 'classfinal-core/src/main/**'
      - 'classfinal-fatjar/src/main/**'
      - 'classfinal-maven-plugin/src/main/**'
      - 'test-springboot/**'
      - '.github/workflows/mac-integration-test.yml'

jobs:
  # ============================================================
  # Mac 集成测试: 编译Native + 构建项目 + Maven插件加密 + 启动验证
  # ============================================================
  mac-maven-plugin-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Show environment
        run: |
          echo "=== OS ==="
          sw_vers
          echo "=== Java ==="
          java -version 2>&1
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME
          echo "=== Clang ==="
          clang --version

      # Step 1: 编译 Mac Native 库 (Universal Binary)
      - name: Build macOS native library
        run: |
          cd classfinal-core
          chmod +x build_native_mac.sh
          ./build_native_mac.sh

      - name: Verify native library
        run: |
          echo "=== File info ==="
          file classfinal-core/src/main/resources/libclassfinal_native.jnilib
          echo "=== Architectures ==="
          lipo -info classfinal-core/src/main/resources/libclassfinal_native.jnilib
          echo "=== Exported symbols (should only show JNI_OnLoad) ==="
          nm -gU classfinal-core/src/main/resources/libclassfinal_native.jnilib | grep " T " || true

      # Step 2: 构建完整 Maven 项目 (安装 classfinal-core, fatjar, maven-plugin 到本地仓库)
      - name: Build Maven project
        run: mvn clean install -DskipTests

      - name: Verify fatjar
        run: |
          echo "=== fatjar ==="
          ls -lh classfinal-fatjar/target/classfinal-fatjar-1.2.1.jar
          echo "=== Native libs in fatjar ==="
          jar tf classfinal-fatjar/target/classfinal-fatjar-1.2.1.jar | grep -E "classfinal_native|libclassfinal"

      # Step 3: 使用 Maven 插件加密测试 Spring Boot 应用
      - name: Build and encrypt test app with maven plugin
        run: |
          cd test-springboot
          mvn clean package -DskipTests 2>&1 | tail -30
          ls -lh target/test-springboot-1.0.0.jar

      # Step 4: 启动加密后的 jar 并验证
      - name: Start encrypted jar and verify
        run: |
          cd test-springboot/target

          echo "=== Starting encrypted jar with javaagent ==="
          java -javaagent:test-springboot-1.0.0-encrypted.jar \
            -jar test-springboot-1.0.0-encrypted.jar \
            --server.port=8080 \
            > app.log 2>&1 &
          APP_PID=$!
          echo "App PID: $APP_PID"

          # 等待应用启动 (最多60秒)
          echo "Waiting for app to start..."
          STARTED=0
          for i in $(seq 1 60); do
            if grep -q "Started Application" app.log 2>/dev/null; then
              echo "=== App started successfully! ==="
              STARTED=1
              break
            fi
            sleep 2
          done

          # 显示日志
          echo "=== Application log ==="
          cat app.log

          # 测试 HTTP 端点
          if [ $STARTED -eq 1 ]; then
            echo ""
            echo "=== Testing /hello endpoint ==="
            curl -s http://localhost:8080/hello || echo "curl failed"
            echo ""
            echo "=== Testing /secret endpoint ==="
            curl -s http://localhost:8080/secret || echo "curl failed"
          fi

          # 停止应用
          kill $APP_PID 2>/dev/null || true
          wait $APP_PID 2>/dev/null || true

          # 验证结果
          if [ $STARTED -eq 1 ]; then
            echo ""
            echo "=========================================="
            echo "  MAC MAVEN-PLUGIN TEST PASSED!"
            echo "=========================================="
            exit 0
          else
            echo ""
            echo "=========================================="
            echo "  MAC MAVEN-PLUGIN TEST FAILED!"
            echo "=========================================="
            exit 1
          fi

      # Step 5: 验证加密后类文件不可直接读取
      - name: Verify encrypted classes
        if: always()
        run: |
          cd test-springboot/target
          echo "=== Checking encrypted class files ==="
          ENCRYPTED_DIR=$(jar tf test-springboot-1.0.0.jar | grep "META-INF/\.classes" | head -1)
          if [ -n "$ENCRYPTED_DIR" ]; then
            echo "Found encrypted directory: $ENCRYPTED_DIR"
            echo "Encrypted classes exist in jar"
          else
            echo "WARNING: No encrypted directory found"
          fi

          ORIG_CLASS=$(jar tf test-springboot-1.0.0.jar | grep "BOOT-INF/classes/com/test/demo/Application.class" | head -1)
          if [ -n "$ORIG_CLASS" ]; then
            echo "WARNING: Original class still exists: $ORIG_CLASS"
          else
            echo "OK: Original class files have been removed"
          fi

  # ============================================================
  # Mac 集成测试: 使用 fatjar 命令行加密 + 启动验证
  # ============================================================
  mac-fatjar-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 1: 编译 Mac Native 库
      - name: Build macOS native library
        run: |
          cd classfinal-core
          chmod +x build_native_mac.sh
          ./build_native_mac.sh

      # Step 2: 构建完整 Maven 项目
      - name: Build Maven project
        run: mvn clean install -DskipTests

      # Step 3: 构建未加密的 Spring Boot jar (跳过 classfinal 插件)
      - name: Build unencrypted test Spring Boot app
        run: |
          cd test-springboot
          mvn clean package -DskipTests -Dclassfinal.skip=true 2>&1 | tail -30
          ls -lh target/test-springboot-1.0.0.jar

      # Step 4: 使用 classfinal-fatjar 加密
      - name: Encrypt test jar with classfinal-fatjar
        run: |
          cd test-springboot/target
          echo "=== Encrypting test-springboot-1.0.0.jar ==="
          java -jar ../../classfinal-fatjar/target/classfinal-fatjar-1.2.1.jar \
            -file test-springboot-1.0.0.jar \
            -packages com.test.demo \
            -cfgfiles "*.properties" \
            -Y 2>&1
          echo "=== Encrypted jar ==="
          ls -lh test-springboot-1.0.0-encrypted.jar

      # Step 5: 启动加密后的 jar 并验证
      - name: Start encrypted jar and verify
        run: |
          cd test-springboot/target

          echo "=== Starting encrypted jar with javaagent ==="
          java -javaagent:test-springboot-1.0.0-encrypted.jar \
            -jar test-springboot-1.0.0-encrypted.jar \
            --server.port=8081 \
            > app.log 2>&1 &
          APP_PID=$!
          echo "App PID: $APP_PID"

          echo "Waiting for app to start..."
          STARTED=0
          for i in $(seq 1 60); do
            if grep -q "Started Application" app.log 2>/dev/null; then
              echo "=== App started successfully! ==="
              STARTED=1
              break
            fi
            sleep 2
          done

          echo "=== Application log ==="
          cat app.log

          if [ $STARTED -eq 1 ]; then
            echo "=== Testing /hello endpoint ==="
            curl -s http://localhost:8081/hello || echo "curl failed"
          fi

          kill $APP_PID 2>/dev/null || true
          wait $APP_PID 2>/dev/null || true

          if [ $STARTED -eq 1 ]; then
            echo "MAC FATJAR TEST PASSED!"
            exit 0
          else
            echo "MAC FATJAR TEST FAILED!"
            exit 1
          fi

  # ============================================================
  # Linux 集成测试 (对比验证)
  # ============================================================
  linux-integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Linux native library
        run: |
          cd classfinal-core
          chmod +x build_native_linux.sh
          ./build_native_linux.sh

      - name: Build Maven project
        run: mvn clean install -DskipTests

      - name: Build and encrypt test app with maven plugin
        run: |
          cd test-springboot
          mvn clean package -DskipTests 2>&1 | tail -30
          ls -lh target/test-springboot-1.0.0.jar

      - name: Start encrypted jar and verify
        run: |
          cd test-springboot/target

          java -javaagent:test-springboot-1.0.0-encrypted.jar \
            -jar test-springboot-1.0.0-encrypted.jar \
            --server.port=8080 \
            > app.log 2>&1 &
          APP_PID=$!

          STARTED=0
          for i in $(seq 1 60); do
            if grep -q "Started Application" app.log 2>/dev/null; then
              echo "App started successfully!"
              STARTED=1
              break
            fi
            sleep 2
          done

          cat app.log

          if [ $STARTED -eq 1 ]; then
            curl -s http://localhost:8080/hello
          fi

          kill $APP_PID 2>/dev/null || true
          wait $APP_PID 2>/dev/null || true

          if [ $STARTED -eq 1 ]; then
            echo "LINUX INTEGRATION TEST PASSED!"
            exit 0
          else
            echo "LINUX INTEGRATION TEST FAILED!"
            exit 1
          fi
